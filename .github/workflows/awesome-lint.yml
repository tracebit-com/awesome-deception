name: awesome-lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npx awesome-lint
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
